; PlatformIO project configuration for OnStepX.
;
; The source tree intentionally keeps the Arduino IDE sketch layout:
;   OnStepX.ino
;   Config.h
;   Extended.config.h
;   src/...
;
; PlatformIO normally expects sources under src/, so this project sets
; src_dir = . and filters the build inputs explicitly.

[platformio]
default_envs = onstepx_esp32_mf_oozoo_e4
src_dir = .
build_dir = .pio/build

[env:onstepx_esp32_mf_oozoo_e4]
platform = platformio/espressif32@6.7.0
board = esp32dev
framework = arduino

board_build.partitions = huge_app.csv
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
  -I.
  -Isrc

build_src_filter =
  +<tools/platformio_main.cpp>
  +<platformio_deps.cpp>
  +<src/**>
  -<OnStepX.ino>
  -<src/lib/commands/commands.ino>
  -<src/telescope/mount/coordinates/coordinates.ino>

lib_deps =
  teemuatlut/TMCStepper@^0.7.3
  adafruit/Adafruit BME280 Library@^2.2.4
  adafruit/Adafruit Unified Sensor@^1.1.14
  adafruit/Adafruit BusIO@^1.16.1

lib_ldf_mode = deep+

; Uncomment these after connecting a JTAG debugger such as ESP-Prog.
; debug_tool = esp-prog
; debug_init_break = tbreak setup
; debug_speed = 500
